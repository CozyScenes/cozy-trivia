<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozy Trivia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --paper: #f5f0e8;
    --ink: #1a1a1a;
    --accent: #c0392b;
    --muted: #7a6e5f;
    --border: #2a2a2a;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Courier Prime', monospace;
    overflow: hidden;
  }

  #full-view {
    display: none;
    width: 100%; height: 100%;
    position: relative;
    padding: 18px 20px 14px;
    flex-direction: column;
  }

  .paper-grain {
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,0,0,0.04) 27px, rgba(0,0,0,0.04) 28px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.015) 40px, rgba(0,0,0,0.015) 41px);
    pointer-events: none;
    z-index: 0;
  }

  .content-wrap {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100%;
  }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 12px;
  }

  .show-label {
    font-family: 'Special Elite', cursive;
    font-size: 18px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .show-badge {
    font-family: 'Special Elite', cursive;
    font-size: 14px;
    letter-spacing: 0.15em;
    color: var(--paper);
    background: var(--ink);
    padding: 4px 10px;
    border: 1px solid var(--ink);
  }

  .mode-label {
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
  }

  .main-content {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
  }

  .category-tag {
    font-size: 17px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    border-left: 4px solid var(--accent);
    padding-left: 10px;
  }

  .trivia-text {
    font-family: 'Special Elite', cursive;
    font-size: 32px;
    font-weight: 700;
    line-height: 1.45;
    color: var(--ink);
    max-width: 95%;
  }

  .trivia-text.answer-text {
    font-size: 40px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.3;
  }

  .bottom-bar {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(0,0,0,0.15);
    padding-top: 8px;
    margin-top: 10px;
  }

  .ep-ref {
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-style: italic;
  }

  .seed-num {
    font-size: 12px;
    color: rgba(0,0,0,0.2);
    letter-spacing: 0.1em;
  }

  .q-mark {
    font-family: 'Special Elite', cursive;
    font-size: 180px;
    color: rgba(0,0,0,0.04);
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-60%);
    pointer-events: none;
    z-index: 0;
    line-height: 1;
  }

  .checkmark {
    font-size: 150px;
    color: rgba(192,57,43,0.07);
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-60%);
    pointer-events: none;
    z-index: 0;
    line-height: 1;
  }

  #small-view {
    display: none;
    width: 100%; height: 100%;
    flex-direction: column;
    justify-content: center;
    padding: 18px 20px;
    position: relative;
  }

  .small-logo {
    font-family: 'Courier Prime', monospace;
    font-size: 15px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    border-left: 4px solid var(--accent);
    padding-left: 10px;
  }

  .small-answer {
    font-family: 'Special Elite', cursive;
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.3;
  }

  .small-ep {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-top: 14px;
  }
</style>
</head>

// ── SEED / SYNC ──
function getSeed() {
  const now = new Date();
  const slot = Math.floor(
    (now.getFullYear() * 10000 + (now.getMonth()+1) * 100 + now.getDate()) * 48 +
    Math.floor((now.getHours() * 60 + now.getMinutes()) / 30)
  );
  let h = slot >>> 0;
  h = Math.imul(h ^ (h >>> 16), 0x45d9f3b);
  h = Math.imul(h ^ (h >>> 16), 0x45d9f3b);
  h = (h ^ (h >>> 16)) >>> 0;
  return h;
}

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 4294967296;
  };
}

function getParams() {
  const params = new URLSearchParams(window.location.search);
  let show = (params.get('show') || 'all').toLowerCase().trim();
  // normalize parameterized values from TRMNL
  if (show.includes('office') || show === 'the_office') show = 'office';
  else if (show.includes('seinfeld')) show = 'seinfeld';
  else if (show.includes('friends')) show = 'friends';
  else show = 'all';

  const view = params.get('view') || 'full';
  return { show, view };
}

function getItem(show) {
  const seed = getSeed();
  const rng = seededRandom(seed);

  // filter pool
  const pool = show === 'all' ? TRIVIA : TRIVIA.filter(t => t.show === show);

  // if "all", also pick which show using same seed (so full + small views agree)
  let pickedShow = show;
  if (show === 'all') {
    const showPick = Math.floor(rng() * 3);
    const shows = ['office', 'seinfeld', 'friends'];
    pickedShow = shows[showPick];
    const showPool = TRIVIA.filter(t => t.show === pickedShow);
    const idx = Math.floor(rng() * showPool.length);
    return { item: showPool[idx], pickedShow, seed };
  }

  const idx = Math.floor(rng() * pool.length);
  return { item: pool[idx], pickedShow, seed };
}

function init() {
  const { show, view } = getParams();
  const { item, pickedShow, seed } = getItem(show);
  const meta = SHOWS[pickedShow];

  if (view === 'full') {
    document.getElementById('full-view').style.display = 'flex';
    document.getElementById('show-label').textContent = meta.label;
    document.getElementById('show-badge').textContent = meta.badge;
    document.getElementById('mode-badge').textContent = '❓ QUESTION';
    document.getElementById('category-tag').textContent = item.cat.toUpperCase() + ' · ' + item.ep;
    document.getElementById('trivia-text').textContent = item.q;
    document.getElementById('deco-q').textContent = '?';
    document.getElementById('deco-q').className = 'q-mark';
    document.getElementById('ep-ref').textContent = item.ep;
    document.getElementById('seed-disp').textContent = '#' + (seed % 10000);
  } else {
    document.getElementById('small-view').style.display = 'flex';
    document.getElementById('small-logo').innerHTML = meta.smallLogo;
    document.getElementById('small-answer').textContent = item.a;
    document.getElementById('small-ep').textContent = item.cat + ' · ' + item.ep;
  }
}

init();
</script>
